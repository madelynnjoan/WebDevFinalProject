<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route</title>
    <link rel="stylesheet" href="style.css">
    <style>
        nav {
            justify-content: center;
            text-align: center;
            background-color: #e1ffac;
            padding: 12px;
        }

        body {
            background-color: #edffd3;
            text-align: center;
            color: #d6baff;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        h1 {
            color: #d6baff;
            font-size: xx-large;
        }

        p {
            background-color: #ffffff;
            margin: 20px;
            padding: 18px;
            border: 1px solid #e6eef3;
            border-radius: 10px;
        }

        #map {
            height: 450px;
            margin: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(32, 52, 58, 0.08);
        }

        footer {
            color: #2b5566;
            margin: 20px;
        }

        .flex-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .leaflet-container {
            background: #f6f8fa;
        }

        .leaflet-tile {
            display: block;
            margin-right: -1px;
            margin-bottom: -1px;
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>
    <nav>
        <a href="homepage.html">Homepage</a>
        <a href="route.html">Route</a>
        <a href="westcoast.html">West Coast</a>
        <a href="midstates.html">Mid States</a>
        <a href="eastcoast.html">East Coast</a>
        <a href="comments.html">Guestbook</a>
    </nav>

    <hr>

    <header>
        <h1>Trip Route Map</h1>
    </header>

    <section>
        <p>Click markers to see stop names</p>
        <div id="map"></div>
    </section>

    <hr>

    <footer>
        Hope you enjoyed our website :)
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        function initMap() {
            const map = L.map('map', {preferCanvas: true}).setView([39.5, -98.35], 4);
            const esriTileUrl = 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}';
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

            const stops = [
                {name: 'Dana Point, CA', lat: 33.467, lng: -117.698},
                {name: 'Grand Canyon, AZ', lat: 36.106, lng: -112.112},
                {name: 'Durango, CO', lat: 37.2753, lng: -107.8801},
                {name: 'Denver, CO', lat: 39.7392, lng: -104.9903},
                {name: 'Kansas University', lat: 39.0119, lng: -95.6752},
                {name: 'Chicago, IL', lat: 41.8781, lng: -87.6298},
                {name: 'Pittsburgh, PA', lat: 40.4406, lng: -79.9959},
                {name: 'Guilford, CT', lat: 41.2838, lng: -72.6811},
                {name: 'University of Vermont', lat: 44.4759, lng: -73.2121}
            ];

            const pinIcon = L.icon({
                iconUrl: 'images/marker.png',
                iconSize: [30, 40],
                iconAnchor: [15, 40]
            });

            stops.forEach(function (s) {
                L.marker([s.lat, s.lng], { icon: pinIcon }).addTo(map).bindPopup('<strong>' + s.name + '</strong>');
            });
        }

        window.addEventListener('load', initMap);
    </script>
</body>

</html>
