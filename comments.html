<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guestbook</title>
    <style>
        body {
            background-color: rgba(255, 236, 210, 0.4);
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            text-align: center;
        }
        nav {
            justify-content: center;
            text-align: center;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            background-color: rgba(255, 180, 100, 0.25);
            padding: 15px;
        }
        h1 {
            text-align: center;
            color: rgb(230, 140, 60);
        }
        h2 {
            text-align: center;
            color: rgb(220, 130, 70);
        }
        p {
            text-align: center;
            color: rgb(180, 100, 40);
            font-size: larger;
            margin: 20px;
            padding: 20px;
            border: 2px solid rgb(230, 160, 90);
            border-radius: 10px;
            background-color: rgba(255, 220, 170, 0.6);
        }
        footer {
            text-align: center;
            color: rgb(200, 130, 60);
        }
    </style>
</head>

<body>
    <nav>
        <a href="homepage.html">Homepage</a>
        <a href="route.html">Route</a>
        <a href="westcoast.html">West Coast</a>
        <a href="midstates.html">Mid States</a>
        <a href="eastcoast.html">East Coast</a>
        <a href="comments.html">Guestbook</a>
    </nav>

    <hr>

    <h1>🎉 Thanks for signing our guestbook!</h1>

    <p id="nameMsg"></p>
    <p id="hometownMsg"></p>
    <p id="typeMsg"></p>
    <p id="messageMsg"></p>

    <p><a href="homepage.html">Back to Homepage</a></p>

    <hr>

    <h2>Previous Comments</h2>
    <div id="previousComments"></div>

    <hr>

    <footer>Hope you enjoyed our website:)</footer>

    <script>
        const params = new URLSearchParams(window.location.search);

        const name = (params.get("name") || "").trim();
        const hometown = (params.get("hometown") || "").trim();
        const type = (params.get("type") || "").trim();
        const message = (params.get("message") || "").trim();

        // Only show fields when they have values to avoid displaying "null"
        document.getElementById("nameMsg").textContent = name ? `Name: ${name}` : "";
        document.getElementById("hometownMsg").textContent = hometown ? `From: ${hometown}` : "";
        document.getElementById("typeMsg").textContent = type ? `Comment type: ${type}` : "";
        document.getElementById("messageMsg").textContent = message ? `Message: ${message}` : "";

        const storageKey = "guestbookComments";
        // Load and clean existing comments (remove entries that are entirely empty)
        let existing = JSON.parse(localStorage.getItem(storageKey) || "[]");
        existing = existing.filter(c => (c && ((c.name && c.name.trim()) || (c.hometown && c.hometown.trim()) || (c.type && c.type.trim()) || (c.message && c.message.trim()))));
        localStorage.setItem(storageKey, JSON.stringify(existing));

        // Save new comment to localStorage only if at least one field is provided
        if (name || hometown || type || message) {
            const newComment = { name, hometown, type, message };
            existing.push(newComment);
            localStorage.setItem(storageKey, JSON.stringify(existing));
        }

        // Display all previous comments using a loop; only append valid comments
        const allComments = JSON.parse(localStorage.getItem(storageKey) || "[]");
        const container = document.getElementById("previousComments");
        container.innerHTML = "";

        if (allComments.length === 0) {
            container.innerHTML = "<p>No comments yet!</p>";
        } else {
            for (let i = 0; i < allComments.length; i++) {
                const comment = allComments[i];
                if (!comment) continue;
                const hasContent = (comment.name && comment.name.trim()) || (comment.hometown && comment.hometown.trim()) || (comment.type && comment.type.trim()) || (comment.message && comment.message.trim());
                if (!hasContent) continue;

                const p = document.createElement("p");
                const parts = [];
                if (comment.name && comment.name.trim()) parts.push(comment.name.trim());
                if (comment.hometown && comment.hometown.trim()) parts.push(`from ${comment.hometown.trim()}`);
                if (comment.type && comment.type.trim()) parts.push(`(${comment.type.trim()})`);
                const msg = comment.message && comment.message.trim() ? `: ${comment.message.trim()}` : "";
                p.textContent = parts.join(' ') + msg;
                container.appendChild(p);
            }
        }
    </script>

</body>

</html>
